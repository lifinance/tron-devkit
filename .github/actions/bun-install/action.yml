# Bun install (composite action)
# - Installs Bun and Node.js (LTS), then runs a frozen lockfile install
# - Use from workflows that need the repo toolchain before build or test steps
# - Known limitations: relies on callers to set working-directory if needed

name: 'Bun install'
description: 'Run bun install with cache enabled'

runs:
  using: 'composite'
  steps:
    - name: Set up Bun
      uses: oven-sh/setup-bun@ecf28ddc73e819eb6fa29df6b34ef8921c743461 # v2.1.3
    - name: Set up Node.js
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
      with:
        node-version: lts/*
        registry-url: 'https://registry.npmjs.org'
    - name: Install dependencies
      shell: bash
      run: bun install --frozen-lockfile
