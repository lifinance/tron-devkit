name: 'Bun install'
description: 'Run bun install with cache enabled'

runs:
  using: 'composite'
  steps:
    - name: Set up Bun
      uses: oven-sh/setup-bun@v2
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: lts/*
        registry-url: 'https://registry.npmjs.org'
    - name: Install dependencies
      shell: bash
      run: bun install --frozen-lockfile
