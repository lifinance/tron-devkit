# Release & Publish
# - Creates GitHub releases from semver tags (v*.*.*, alpha, beta)
# - Builds and publishes the tron-devkit package to npm with provenance
# - Triggers: push of matching version tags, or manual workflow_dispatch

name: Release & Publish

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+-alpha.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-beta.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:

concurrency:
  group: release-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    permissions:
      contents: write # required to create GitHub releases
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@eef61447b9ff4aafe5dcd4e0bbf5d482be7e7871 # v4.2.1
      - name: Create GitHub Release
        uses: softprops/action-gh-release@b25b93d384199fc0fc8c2e126b2d937a0cbeb2ae # v2.5.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          generate_release_notes: true
          name: ${{ github.ref_name }}
          draft: false
          prerelease: false

  publish:
    permissions:
      contents: write # required to checkout and publish packages
      id-token: write # required for npm provenance (OIDC)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@eef61447b9ff4aafe5dcd4e0bbf5d482be7e7871 # v4.2.1
      - name: Install dependencies
        uses: ./.github/actions/bun-install
      - name: Build tron-devkit package
        run: bun run build --filter @lifi/tron-devkit
      - name: Publish to npm
        working-directory: packages/tron-lib
        run: |
          npm publish --no-git-checks --access public \
          ${{ contains(github.ref_name, 'alpha') && '--tag alpha' || contains(github.ref_name, 'beta') && '--tag beta' || '' }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
