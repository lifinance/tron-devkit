# Semantic PR Title
# - Validates pull request titles follow Conventional Commits / semantic format
# - Triggers: pull_request_target (opened, edited, synchronize, reopened)
# - Key behavior: uses the default GITHUB_TOKEN to read the PR title
# - Known limitations: pull_request_target runs in the base repo context; review third-party PR implications

name: Semantic PR Title

on:
  pull_request_target:
    types:
      - opened
      - edited
      - synchronize
      - reopened

permissions:
  pull-requests: read # required to read the pull request title

jobs:
  validate-pr-title:
    name: Validate PR title
    runs-on: ubuntu-latest
    steps:
      - name: Validate semantic pull request title
        uses: amannn/action-semantic-pull-request@cfb60706e18bc85e8aec535e3c577abe8f70378e # v5.5.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
